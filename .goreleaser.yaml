version: 2
project_name: fundpulse

before:
  hooks:
    - go mod tidy

builds:
  - id: fundpulse
    main: ./cmd/fundpulse
    binary: fundpulse
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: tar
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: lizarusi
    name: fundpulse

homebrew_casks:
  - name: fundpulse
    repository:
      owner: lizarusi
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/lizarusi/fundpulse"
    description: "Daily Mac CLI that scrapes investment funds from analizy.pl and posts a Telegram digest."
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr",
                         args: ["-dr", "com.apple.quarantine", "#{staged_path}/fundpulse"]
